name: FFP Otomatik Guncelleme

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  guncelle:
    runs-on: ubuntu-latest
    
    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Gereksinimleri yukle
        run: pip install requests feedparser beautifulsoup4

      - name: Haberleri guncelle
        run: python guncelle.py

      - name: Degisiklikleri kaydet
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "FFP Auto Updater"
          git add index.html
          git diff --staged --quiet || git commit -m "Otomatik guncelleme: $(date '+%d.%m.%Y %H:%M')"
          git push
